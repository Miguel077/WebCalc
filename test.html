<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebCalc Pro</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --btn-bg: #333;
            --accent-blue: #2c5d87; --accent-green: #27ae60; --accent-red: #c0392b;
            --accent-gray: #455a64; --hex-btn: #2a2a2a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            height: 100svh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }
        #top-section { display: flex; flex-direction: column; flex: 1; min-height: 60px; gap: 5px; }
        #display {
            width: 100%; flex: 1; background: #000; color: #00ff00;
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.1rem; resize: none; outline: none;
            touch-action: none; /* Verhindert natives Scrollen, damit Swipes sofort erkannt werden */
        }
        #result-area {
            width: 100%; background: #1e1e1e; padding: 8px; border-radius: 8px;
            border-left: 5px solid var(--accent-blue); font-size: 0.95rem; word-wrap: break-word; flex-shrink: 0; min-height: 45px;
        }
        #controls { margin-top: 8px; flex-shrink: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; width: 100%; max-width: 500px; margin: 0 auto; }

        button { padding: 12px 2px; font-size: 1rem; border: none; border-radius: 5px; background: var(--btn-bg); color: white; touch-action: manipulation; }
        .op { color: #3498db; font-weight: bold; }
        .func-btn { background: #5d4037; font-weight: bold; }
        .del-back { background: #e53935 !important; }
        .del-clear { background: #7f0000 !important; color: #ffcdd2 !important; }

        .del { background: var(--accent-red); }
        .equal { background: var(--accent-green); grid-column: span 2; font-weight: bold; }
        .hex { background: var(--hex-btn); color: #bb86fc; font-weight: bold; }
        .num { background: #444; font-weight: bold; }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #252525; padding: 20px; border-radius: 12px; z-index: 1000;
            width: 90%; max-height: 80vh; border: 2px solid #444;
        }
        .modal.active { display: flex; flex-direction: column; }
        .modal-content { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .menu-btn { padding: 12px 5px; background: #444; color: #fff; border-radius: 5px; font-size: 0.85rem; text-align: center; cursor: pointer; }
        .mode-toggle { padding: 5px 10px; background: var(--accent-blue); color: white; border-radius: 4px; font-size: 0.8rem; float: right; cursor: pointer; }
        .list-item {
            padding: 15px; border-bottom: 1px solid #333; color: #00ff00;
            font-family: monospace; cursor: pointer; width: 100%; display: block;
            text-align: left; background: transparent; border-left: none; border-right: none; border-top: none;
        }
        .list-item:active { background: #333; }
        /* Das schwebende Variablen-Popup */
        #var-popup {
            position: fixed;
            background: #2c3e50;
            color: #00ff00;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            z-index: 9999;
            display: none;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 1px solid var(--accent-blue);
            transition: opacity 0.2s;
        }
        #var-popup::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); border-width: 6px; border-style: solid;
            border-color: #2c3e50 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div id="top-section">
        <textarea id="display" placeholder="Wisch rauf für Tastatur..." inputmode="none" spellcheck="false"></textarea>
        <div id="result-area">Bereit...</div>
        <div id="debug-storage" style="margin-top: 5px; font-size: 0.75rem; color: #888; font-family: monospace; background: #151515; padding: 5px; border-radius: 5px; display: none;">
    <b>Speicher:</b> <span id="storage-list">leer</span>
</div>
    </div>

    <div id="controls">
        <div class="grid">
            <button class="op" onclick="add('+')">+</button>
            <button class="op" onclick="add('-')">-</button>
            <button class="op" onclick="add('*')">*</button>
            <button class="op" onclick="add('/')">/</button>
            <button class="op" onclick="add('=')">=</button>
            <button class="op" style="background:var(--accent-gray)" id="HistBtn" onclick="openHistory()">Hist</button>

            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="add('^')">^</button>
            <button onclick="add('pi')">pi</button>
            <button class="op" style="background:#444" onclick="openMath()">Math</button>
            <button class="func-btn" id="FuncBtn" onclick="openFunc()">Func</button>

            <button class="hex" onclick="add('A')">A</button>
            <button class="hex" onclick="add('B')">B</button>
            <button class="num" onclick="add('7')">7</button>
            <button class="num" onclick="add('8')">8</button>
            <button class="num" onclick="add('9')">9</button>
            <button class="del-clear" id="clearBtn">AC</button>

            <button class="hex" onclick="add('C')">C</button>
            <button class="hex" onclick="add('D')">D</button>
            <button class="num" onclick="add('4')">4</button>
            <button class="num" onclick="add('5')">5</button>
            <button class="num" onclick="add('6')">6</button>
            <button class="del" id="backspaceBtn" onclick="backspace()">⌫</button>

            <button class="hex" onclick="add('E')">E</button>
            <button class="hex" onclick="add('F')">F</button>
            <button class="num" onclick="add('1')">1</button>
            <button class="num" onclick="add('2')">2</button>
            <button class="num" onclick="add('3')">3</button>
            <!-- <button class="op" style="background:#555; color:#00ff00;" onclick="add('\n')">↲</button> -->
            <button class="op" style="background:#555; color:#00ff00;" onclick="add('\n')"><div style="transform: scale(1.8); font-weight: bold; line-height: 1;">↲</div></button>

            <button class="hex" onclick="add('x')">0x</button>
            <button onclick="add(' ')">␣</button>
            <button class="num" onclick="add('.')">.</button>
            <button class="num" onclick="add('0')">0</button>
            <button class="equal" style="grid-column: span 2;" onclick="calculate()">Calculate</button>
        </div>
    </div>

    <div id="overlay" onclick="closeAllModals()"></div>

    <div id="mathModal" class="modal" style="border-color: var(--accent-green);">
        <div style="margin-bottom: 15px;"><span style="color: var(--accent-green); font-weight:bold;">Math</span><span id="modeDisplay" class="mode-toggle" onclick="toggleDegRad()">Mode: DEG</span></div>
        <div class="modal-content"><div class="menu-grid" id="mathGrid"></div></div>
        <button class="menu-btn" style="width:100%; background:var(--accent-red);" onclick="closeAllModals()">Schließen</button>
    </div>

    <div id="historyModal" class="modal" style="border-color: var(--accent-gray);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="color: var(--accent-gray); font-weight:bold;">History / Longpress to delete Entry</span>
            <button class="mode-toggle" style="background:var(--accent-red)" onclick="clearHistory()">Löschen</button>
        </div>
        <div class="modal-content" id="historyContent"></div>
        <button class="menu-btn" style="width:100%;" onclick="closeAllModals()">Schließen</button>
    </div>

    <div id="funcModal" class="modal" style="border-color: var(--accent-blue);">
        <div style="margin-bottom:15px;"><span style="color: var(--accent-blue); font-weight:bold;">Bibliothek / Longpress to delete Entry</span></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:15px;">
            <div class="menu-btn" onclick="saveCurrent()">💾 Save</div>
            <div class="menu-btn" onclick="exportToFile()">📤 Export</div>
            <div class="menu-btn" onclick="triggerImport()">📥 Import</div>
            <div class="menu-btn" onclick="closeAllModals()">✖ Exit</div>
        </div>
        <div class="modal-content" id="funcContent"></div>
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">

    <script>
        const display = document.getElementById('display');
        const resArea = document.getElementById('result-area');
        const acBtn = document.getElementById('clearBtn');
        const mathFuncs = ['sin(', 'cos(', 'tan(', 'asin(', 'acos(', 'atan(', 'log(', 'ln(', 'sqrt(', 'abs(', 'exp(', 'random()', 'ceil(', 'floor(', 'round(', ' and ', ' or ', ' xor '];

        let lastContent = "";
        let useDegrees = true;
        let bsTimer;
        let popupTimer;
        let varStorage = {};
        const clearBtn = document.getElementById('clearBtn');
        // Erstelle das Popup-Element dynamisch, falls nicht im HTML vorhanden
        const popup = document.createElement('div');
        Object.assign(popup.style, {
            position: 'fixed', display: 'none', background: '#333', color: '#00ff00',
            padding: '10px', borderRadius: '8px', border: '1px solid #444',
            zIndex: '10000', fontFamily: 'monospace', boxShadow: '0 4px 15px rgba(0,0,0,0.5)'
        });
        document.body.appendChild(popup);

        // Optimierte Gestensteuerung (global, auch mit fokussiertem Fenster)
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, {passive: false}); // passive: false erlaubt uns preventDefault()

        document.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;

            if (Math.abs(diff) > 30) { // Schwelle auf 30px gesenkt für schnellere Reaktion
                e.preventDefault();
                if (diff > 0) { // Wisch nach oben
                    display.inputMode = "none";
                    display.blur();
                    display.inputMode = "text";
                    display.focus();
                } else { // Wisch nach unten
                    display.inputMode = "none";
                    display.blur();
                    display.focus();
                }
            }
        }, {passive: false});

        function logBase(val, base = 10) { return Math.log(val) / Math.log(base); }

        function add(v) {
            const start = display.selectionStart, end = display.selectionEnd;
            display.setRangeText(v === 'x' ? '0x' : v, start, end, 'end');
            display.focus();
        }

        function backspace() {
            const start = display.selectionStart, end = display.selectionEnd;
            if (start === end && start > 0) {
                display.value = display.value.slice(0, start - 1) + display.value.slice(start);
                display.selectionStart = display.selectionEnd = start - 1;
            } else if (start !== end) {
                display.setRangeText('', start, end, 'end');
            }
            display.focus();
        }

        acBtn.onmousedown = acBtn.ontouchstart = (e) => {
            e.preventDefault();
            
            if (display.value !== "") {
                lastContent = display.value;
                display.value = "";
                resArea.innerText = "Display & Speicher geleert";
            }

            // Radikaler Reset des Rechner-Speichers:
            varStorage = {}; 

            bsTimer = setTimeout(() => {
                if (display.value === "" && lastContent !== "") {
                    display.value = lastContent;
                    resArea.innerText = "Undo: Display zurück";
                }
            }, 600);
        };

        acBtn.onmouseup = acBtn.onmouseleave = acBtn.ontouchend = () => clearTimeout(bsTimer);

        function calculate() {
            display.inputMode = "none"; display.blur();
            try {
                let input = display.value.trim();
                if(!input) return;
                let rawInput = input;

                // 1. Mathematische Ersetzungen (wie bisher)
                input = input.replace(/\bx([0-9a-fA-F]+)\b/g, '0x$1').replace(/(\d)(?=[a-df-wyzA-DF-WYZ\(])/g, '$1*');

                let trigIn = useDegrees ? "(Math.PI/180*" : "(";
                let processedCode = input.replace(/\bpi\b/g, 'Math.PI').replace(/\be\b/g, 'Math.E')
                    .replace(/\bsin\(/g, 'Math.sin' + trigIn).replace(/\bcos\(/g, 'Math.cos' + trigIn).replace(/\btan\(/g, 'Math.tan' + trigIn)
                    .replace(/\basin\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.asin($1))" : "Math.asin($1)"))
                    .replace(/\bacos\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.acos($1))" : "Math.acos($1)"))
                    .replace(/\batan\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.atan($1))" : "Math.atan($1)"))
                    .replace(/\b(abs|ceil|floor|round|exp|sqrt|random)\(/g, 'Math.$1(')
                    .replace(/\blog\(/g, 'logBase(').replace(/\bln\(/g, 'Math.log(').replace(/\^/g, '**')
                    .replace(/\band\b/g, '&').replace(/\bor\b/g, '|').replace(/\bxor\b/g, '^');

                // 2. Zeilenweise Verarbeitung für Variablen
                let lines = processedCode.split('\n');
                let finalResult;

                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;

                    // Bestehende Variablen für diese Zeile verfügbar machen
                    let contextPrefix = "";
                    for (let v in varStorage) {
                        contextPrefix += `let ${v} = varStorage['${v}']; `;
                    }

                    if (line.includes('=') && !line.match(/==|!=|<=|>=/)) {
                        // Es ist eine Zuweisung (z.B. a = 5)
                        let parts = line.split('=');
                        let varName = parts[0].trim();
                        let expression = parts.slice(1).join('=');
                        
                        // Berechne den Wert der rechten Seite im aktuellen Kontext
                        let val = eval(contextPrefix + expression);
                        varStorage[varName] = val; // Speichern im globalen varStorage
                        finalResult = val;
                    } else {
                        // Es ist eine normale Rechnung (z.B. a * 5)
                        finalResult = eval(contextPrefix + line);
                    }
                });

                // 3. Ergebnis anzeigen
                if(finalResult !== undefined) {
                    let resStr = (typeof finalResult === 'number') ? 
                        (Number.isInteger(finalResult) ? finalResult.toString() : finalResult.toPrecision(10)) : finalResult;
                    
                    resArea.innerHTML = "<b>Ergebnis:</b><br>" + resStr + 
                        (Number.isInteger(finalResult) ? " <br><small>Hex: 0x" + finalResult.toString(16).toUpperCase() + "</small>" : "");
                    addToHistory(rawInput, resStr);
                }
            } catch(e) { 
                resArea.innerText = "Fehler: " + e.message; 
            }
        }

        function addToHistory(q, a) {
            let h = JSON.parse(localStorage.getItem('calcHist') || '[]');
            h.unshift({q, a, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
            localStorage.setItem('calcHist', JSON.stringify(h.slice(0, 50)));
        }

        function clearHistory() { localStorage.removeItem('calcHist'); openHistory(); }

        function openHistory() {
            const h = JSON.parse(localStorage.getItem('calcHist') || '[]');
            const cont = document.getElementById('historyContent');
            cont.innerHTML = "";
            h.forEach((i, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<small>${i.t}</small> ${i.q}<br><b style="color:var(--accent-green)">= ${i.a}</b>`;

                let pressTimer;
                const start = (e) => {
                    pressTimer = setTimeout(() => {
                        if(confirm("Eintrag löschen?")) {
                            let currentH = JSON.parse(localStorage.getItem('calcHist') || '[]');
                            currentH.splice(idx, 1);
                            localStorage.setItem('calcHist', JSON.stringify(currentH));
                            openHistory();
                        }
                    }, 600);
                };
                const cancel = () => clearTimeout(pressTimer);
            
                div.onmousedown = div.ontouchstart = start;
                div.onmouseup = div.onmouseleave = div.ontouchend = cancel;

                div.onclick = () => { 
                    display.value = i.q; 
                    closeAllModals(); 
                };
                cont.appendChild(div);
            });
            showModal('historyModal');
        }

        function openMath() {
            const grid = document.getElementById('mathGrid'); grid.innerHTML = '';
            mathFuncs.forEach(f => {
                const b = document.createElement('div');
                b.className = 'menu-btn';
                b.innerText = f.replace('(', '').replace(')', '');
                b.onclick = () => { add(f); closeAllModals(); };
                grid.appendChild(b);
            });
            showModal('mathModal');
        }

        function openFunc() {
            const f = JSON.parse(localStorage.getItem('mySpecs') || '{}');
            const cont = document.getElementById('funcContent');
            cont.innerHTML = "";
            Object.keys(f).sort().forEach(n => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = n;
                        
                let pressTimer;
                const start = (e) => {
                    pressTimer = setTimeout(() => {
                        if(confirm(`'${n}' wirklich löschen?`)) {
                            const currentF = JSON.parse(localStorage.getItem('mySpecs') || '{}');
                            delete currentF[n];
                            localStorage.setItem('mySpecs', JSON.stringify(currentF));
                            openFunc();
                        }
                    }, 600);
                };
                const cancel = () => clearTimeout(pressTimer);
            
                div.onmousedown = div.ontouchstart = start;
                div.onmouseup = div.onmouseleave = div.ontouchend = cancel;
            
                div.onclick = () => { 
                    display.value = f[n]; 
                    closeAllModals(); 
                };
                cont.appendChild(div);
            });
            showModal('funcModal');
        }

        function saveCurrent() {
            const n = prompt("Name für Favorit?");
            if(n) {
                const f = JSON.parse(localStorage.getItem('mySpecs') || '{}');
                f[n] = display.value;
                localStorage.setItem('mySpecs', JSON.stringify(f));
                openFunc();
            }
        }

        function triggerImport() { document.getElementById('fileInput').click(); }

        function exportToFile() {
            const data = localStorage.getItem('mySpecs') || '{}';
            const n = prompt("Dateiname für Export?", "calc_library.json");
            if (!n) return; // Abbrechen, falls kein Name eingegeben wurde

            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = n.endsWith('.json') ? n : n + '.json';
            document.body.appendChild(a); // Notwendig für einige Browser
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }
        function importFromFile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('mySpecs', ev.target.result); openFunc(); };
            reader.readAsText(e.target.files[0]);
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; }
        function toggleDegRad() { useDegrees = !useDegrees; document.getElementById('modeDisplay').innerText = useDegrees ? "Mode: DEG" : "Mode: RAD"; }

        document.querySelectorAll('#controls button').forEach(btn => {
            btn.addEventListener('touchstart', e => {
                // Schließe beide Spezial-Buttons (AC und Backspace) von der Standard-Logik aus
                if (btn.id === 'clearBtn' || btn.id === 'backspaceBtn') return;
            
                e.preventDefault(); 
            
                if (typeof btn.onclick === 'function') {
                    btn.onclick();
                }
            
                if (document.activeElement !== display) {
                    display.focus();
                }
            }, {passive: false});
        });

        display.onclick = (e) => {
            const text = display.value;
            const pos = display.selectionStart;
            
            // Wort unter dem Cursor extrahieren
            const word = (text.slice(0, pos).match(/[a-zA-Z0-9_]+$/)?.[0] || "") + 
                        (text.slice(pos).match(/^[a-zA-Z0-9_]+/)?.[0] || "");

            if (word && varStorage[word] !== undefined) {
                const val = varStorage[word];
                const isInt = Number.isInteger(val);

                // Inhalt setzen: Name = Wert (und Hex, falls Integer)
                popup.innerHTML = `<b>${word}</b> = ${val}${isInt ? `<br><small style="color:#bb86fc">Hex: 0x${val.toString(16).toUpperCase()}</small>` : ""}`;
                
                popup.style.display = 'block';

                // Position direkt beim Klick (mit kleinem Versatz nach oben)
                popup.style.left = (e.clientX + 10) + 'px';
                popup.style.top = (e.clientY - 40) + 'px';

                // Nach 2 Sekunden ausblenden
                setTimeout(() => popup.style.display = 'none', 2000);
            }
        };

    </script>
    <div id="var-popup"></div>
</body>
</html>
