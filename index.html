<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebCalc Pro</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --btn-bg: #333;
            --accent-blue: #2c5d87; --accent-green: #27ae60; --accent-red: #c0392b;
            --accent-gray: #455a64; --hex-btn: #2a2a2a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            height: 100svh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }
        #top-section { display: flex; flex-direction: column; flex: 1; min-height: 60px; width: 100%; gap: 5px; }
        #display {
            width: 100%; flex: 1; background: #000; color: #00ff00;
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.1rem; resize: none; outline: none;
        }
        #result-area {
            width: 100%; background: #1e1e1e; padding: 8px; border-radius: 8px;
            border-left: 5px solid var(--accent-blue); font-size: 0.95rem; word-wrap: break-word; flex-shrink: 0; min-height: 40px;
        }
        #controls { margin-top: 8px; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; width: 100%; max-width: 500px; margin: 0 auto; }
        
        button { padding: 12px 2px; font-size: 1rem; border: none; border-radius: 5px; background: var(--btn-bg); color: white; touch-action: manipulation; }
        .op { color: #3498db; font-weight: bold; }
        .func { background: #5d4037; font-weight: bold; }
        .del { background: var(--accent-red); }
        .equal { background: var(--accent-green); grid-column: span 2; font-weight: bold; }
        .hex { background: var(--hex-btn); color: #bb86fc; font-weight: bold; }
        .num { background: #444; font-weight: bold; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #252525; padding: 15px; border-radius: 12px; z-index: 1000; width: 90%; max-height: 80vh; border: 1px solid #444;
        }
        .modal.active { display: flex; flex-direction: column; }
        .modal-content { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .list-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.9rem; }
        .menu-btn { padding: 10px; background: #444; color: #fff; border-radius: 5px; text-align: center; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="top-section">
        <textarea id="display" placeholder="Wisch rauf für Tastatur..." inputmode="none" spellcheck="false"></textarea>
        <div id="result-area">Bereit...</div>
    </div>

    <div id="controls">
        <div class="grid">
            <button class="op" onclick="add('+')">+</button>
            <button class="op" onclick="add('-')">-</button>
            <button class="op" onclick="add('*')">*</button>
            <button class="op" onclick="add('/')">/</button>
            <button class="op" onclick="add('=')">=</button>
            <button class="del" id="backspaceBtn">⌫</button>

            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="add('^')">^</button>
            <button onclick="add('pi')">pi</button>
            <button class="op" style="background:#444" onclick="openMath()">Math</button>
            <button class="op" style="background:var(--accent-gray)" onclick="openHistory()">Hist</button>

            <button class="func" onclick="openFunc()">Func</button>
            <button onclick="add('ln(')">ln</button>
            <button onclick="add('log(')">log</button>
            <button onclick="add('sqrt(')">sqrt</button>
            <button class="equal" onclick="calculate()">BERECHNEN</button>
        </div>

        <div id="extra-keys" class="grid" style="margin-top:4px;">
            <button class="hex" onclick="add('A')">A</button><button class="hex" onclick="add('B')">B</button><button class="hex" onclick="add('C')">C</button>
            <button class="num" onclick="add('7')">7</button><button class="num" onclick="add('8')">8</button><button class="num" onclick="add('9')">9</button>
            <button class="hex" onclick="add('D')">D</button><button class="hex" onclick="add('E')">E</button><button class="hex" onclick="add('F')">F</button>
            <button class="num" onclick="add('4')">4</button><button class="num" onclick="add('5')">5</button><button class="num" onclick="add('6')">6</button>
            <button class="hex" onclick="add('0x')">0x</button><button class="hex" onclick="add('0')">0</button><button class="hex" onclick="add('.')">.</button>
            <button class="num" onclick="add('1')">1</button><button class="num" onclick="add('2')">2</button><button class="num" onclick="add('3')">3</button>
        </div>
    </div>

    <div id="overlay" onclick="closeAllModals()"></div>

    <div id="modal" class="modal">
        <div id="modalTitle" style="margin-bottom:10px; font-weight:bold; color:var(--accent-blue)"></div>
        <div class="modal-content" id="modalContent"></div>
        <button class="menu-btn" onclick="closeAllModals()">Schließen</button>
    </div>

    <script>
        const display = document.getElementById('display');
        const resArea = document.getElementById('result-area');
        const delBtn = document.getElementById('backspaceBtn');
        let useDegrees = true;
        let bsTimer, lastDeleted = "";

        // --- GESTENSTEUERUNG ---
        let touchStartY = 0;
        display.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY, {passive: true});
        display.addEventListener('touchend', e => {
            const diff = touchStartY - e.changedTouches[0].clientY;
            if (diff > 60) { display.inputMode = "text"; display.focus(); }
            else if (diff < -60) { display.inputMode = "none"; display.blur(); }
        });

        function add(v) {
            const start = display.selectionStart, end = display.selectionEnd;
            display.setRangeText(v, start, end, 'end');
            display.focus();
        }

        // --- BACKSPACE LOGIK (Original: Long Press = Clear, Click = Restore) ---
        function backspace() {
            if (display.value === "" && lastDeleted !== "") {
                display.value = lastDeleted;
                lastDeleted = "";
            } else {
                const start = display.selectionStart;
                if (start > 0) {
                    display.value = display.value.slice(0, start - 1) + display.value.slice(start);
                    display.selectionStart = display.selectionEnd = start - 1;
                }
            }
            display.focus();
        }

        delBtn.onmousedown = delBtn.ontouchstart = (e) => {
            e.preventDefault();
            bsTimer = setTimeout(() => {
                lastDeleted = display.value;
                display.value = "";
                resArea.innerText = "Geleert (Klick für Undo)";
            }, 600);
        };
        delBtn.onmouseup = delBtn.ontouchend = (e) => {
            clearTimeout(bsTimer);
            if (Date.now() - (this.lastDown || 0) < 600) backspace();
        };
        delBtn.onclick = () => { /* Handler via Touch/Mouse erledigt */ };

        // --- BERECHNUNG ---
        function calculate() {
            display.inputMode = "none"; display.blur();
            try {
                let input = display.value;
                if(!input.trim()) return;
                let rawInput = input;
                let calc = input.replace(/\bx([0-9a-fA-F]+)\b/g, '0x$1').replace(/(\d)(?=[a-df-wyzA-DF-WYZ\(])/g, '$1*');
                
                let trigIn = useDegrees ? "(Math.PI/180*" : "(";
                let code = calc.replace(/pi/g, 'Math.PI')
                    .replace(/\basin\(/g, (useDegrees ? "(180/Math.PI*Math.asin(" : "Math.asin("))
                    .replace(/\bacos\(/g, (useDegrees ? "(180/Math.PI*Math.acos(" : "Math.acos("))
                    .replace(/\batan\(/g, (useDegrees ? "(180/Math.PI*Math.atan(" : "Math.atan("))
                    .replace(/\bsin\(/g, 'Math.sin' + trigIn).replace(/\bcos\(/g, 'Math.cos' + trigIn).replace(/\btan\(/g, 'Math.tan' + trigIn)
                    .replace(/\b(abs|ceil|floor|round|exp|sqrt|random)\(/g, 'Math.$1(')
                    .replace(/\blog\(/g, '(Math.log10(').replace(/\bln\(/g, '(Math.log(').replace(/\^/g, '**');

                let res = eval(code.split('\n').map(l => l.trim().includes('=') ? "var " + l : l).join(';'));
                if(res !== undefined) {
                    let formatted = res.toLocaleString('de-DE');
                    resArea.innerHTML = "<b>Ergebnis:</b> " + formatted + (Number.isInteger(res) ? " <br>Hex: 0x" + res.toString(16).toUpperCase() : "");
                    saveHistory(rawInput, formatted);
                }
            } catch(e) { resArea.innerText = "Fehler: " + e.message; }
        }

        // --- HISTORY & MODALS ---
        function saveHistory(q, a) {
            let h = JSON.parse(localStorage.getItem('calcHist') || '[]');
            h.unshift({q, a}); h = h.slice(0, 20);
            localStorage.setItem('calcHist', JSON.stringify(h));
        }

        function openHistory() {
            const h = JSON.parse(localStorage.getItem('calcHist') || '[]');
            showModal("HISTORY", h.map(i => `<div class="list-item" onclick="display.value='${i.q}';closeAllModals()">${i.q} <span style="color:var(--accent-green)">= ${i.a}</span></div>`).join('') || "Kein Verlauf");
        }

        function openMath() {
            const funcs = ['sin(', 'cos(', 'tan(', 'asin(', 'acos(', 'atan(', 'sqrt(', 'abs(', 'log(', 'exp('];
            showModal("MATH", `<div class="grid" style="grid-template-columns:repeat(3,1fr)">${funcs.map(f => `<button onclick="add('${f}');closeAllModals()">${f.replace('(','')}</button>`).join('')}</div>`);
        }

        function openFunc() {
            showModal("LIBRARY", `<div class="list-item" onclick="add('sqrt(x^2+y^2)');closeAllModals()">Pythagoras</div>`);
        }

        function showModal(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAllModals() { document.getElementById('modal').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        function toggleDegRad() { useDegrees = !useDegrees; calculate(); }

        // Button Fokus-Fix
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', e => { if(btn.id !== 'backspaceBtn') e.preventDefault(); });
        });
    </script>
</body>
</html>
