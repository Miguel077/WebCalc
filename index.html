<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="calculator.png">
    <link rel="apple-touch-icon" href="calculator.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebCalc Pro</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --btn-bg: #333;
            --accent-blue: #2c5d87; --accent-green: #27ae60; --accent-red: #c0392b;
            --accent-gray: #455a64; --hex-btn: #1a1a1a;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 10px;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #top-section {
            display: flex; flex-direction: column;
            flex: 1; min-height: 80px;
            width: 100%; gap: 5px;
        }

        #display {
            width: 100%; flex: 1;
            background: #000; color: #00ff00;
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.1rem; resize: none; outline: none;
        }

        #result-area {
            width: 100%; background: #1e1e1e; padding: 10px; border-radius: 8px;
            border-left: 5px solid var(--accent-blue);
            font-size: 1rem; word-wrap: break-word; flex-shrink: 0;
            min-height: 45px;
        }

        #controls { margin-top: 10px; flex-shrink: 0; width: 100%; }

        .grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
            width: 100%; max-width: 500px; margin: 0 auto;
        }

        /* Der Ziffern/Hex-Block, der bei Tastatur ausgeblendet wird */
        #extra-keys { margin-top: 4px; }

        button {
            padding: 12px 2px; font-size: 1rem; border: none; border-radius: 5px;
            background: var(--btn-bg); color: white; touch-action: manipulation;
        }
        .op { color: #3498db; font-weight: bold; }
        .func { background: #5d4037; font-weight: bold; }
        .del { background: var(--accent-red); }
        .equal { background: var(--accent-green); grid-column: span 2; font-weight: bold; }
        .hex { background: var(--hex-btn); color: #8e44ad; font-weight: bold; }
        .num { background: #444; font-weight: bold; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #252525; padding: 20px; border-radius: 12px; z-index: 1000; 
            width: 85%; max-height: 80vh; 
        }
        .modal.active { display: flex; flex-direction: column; }
        .modal-content { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .menu-btn { padding: 12px 5px; background: #444; color: #fff; border-radius: 5px; font-size: 0.85rem; text-align: center; }
        .mode-toggle { padding: 5px 10px; background: var(--accent-blue); color: white; border-radius: 4px; font-size: 0.8rem; float: right; cursor: pointer; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; color: #00ff00; font-family: monospace; cursor: pointer; }
    </style>
</head>
<body>

    <div id="top-section">
        <textarea id="display" placeholder="Eingabe..." spellcheck="false"></textarea>
        <div id="result-area">Bereit...</div>
    </div>

    <div id="controls">
        <div class="grid">
            <button class="op" onclick="add('+')">+</button>
            <button class="op" onclick="add('-')">-</button>
            <button class="op" onclick="add('*')">*</button>
            <button class="op" onclick="add('/')">/</button>
            <button class="op" onclick="add('=')">=</button>
            <button class="del" id="backspaceBtn">⌫</button>

            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="add('^')">^</button>
            <button onclick="add('pi')">pi</button>
            <button class="op" style="background:#444" onclick="openMath()">Math</button>
            <button class="op" style="background:var(--accent-gray)" onclick="openHistory()">Hist</button>

            <button class="func" onclick="openFunc()">Func</button>
            <button onclick="add('ln(')">ln</button>
            <button onclick="add('log(')">log</button>
            <button onclick="add('sqrt(')">sqrt</button>
            <button class="equal" onclick="calculate()">BERECHNEN</button>
        </div>

        <div id="extra-keys" class="grid">
            <button class="hex" onclick="add('A')">A</button>
            <button class="hex" onclick="add('B')">B</button>
            <button class="hex" onclick="add('C')">C</button>
            <button class="num" onclick="add('7')">7</button>
            <button class="num" onclick="add('8')">8</button>
            <button class="num" onclick="add('9')">9</button>
            
            <button class="hex" onclick="add('D')">D</button>
            <button class="hex" onclick="add('E')">E</button>
            <button class="hex" onclick="add('F')">F</button>
            <button class="num" onclick="add('4')">4</button>
            <button class="num" onclick="add('5')">5</button>
            <button class="num" onclick="add('6')">6</button>

            <button class="hex" onclick="add('0x')">0x</button>
            <button class="hex" onclick="add('.')">.</button>
            <button class="hex" onclick="add('0')">0</button>
            <button class="num" onclick="add('1')">1</button>
            <button class="num" onclick="add('2')">2</button>
            <button class="num" onclick="add('3')">3</button>
        </div>
    </div>

    <div id="overlay" onclick="closeAllModals()"></div>

    <div id="mathModal" class="modal" style="border: 2px solid var(--accent-green);">
        <div style="margin-bottom: 15px; flex-shrink: 0;"><span style="font-size: 1.2rem; color: var(--accent-green);">Math</span><span id="modeDisplay" class="mode-toggle" onclick="toggleDegRad()">Mode: DEG</span></div>
        <div class="modal-content"><div class="menu-grid" id="mathGrid"></div></div>
        <button class="menu-btn" style="width:100%; background:var(--accent-red);" onclick="closeAllModals()">Schließen</button>
    </div>

    <div id="modal" class="modal" style="border: 2px solid var(--accent-blue);">
        <div style="flex-shrink: 0;"><h3 style="margin-top:0; color:var(--accent-blue)">Bibliothek</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:15px;">
                <div class="menu-btn" onclick="saveCurrent()">💾 Save</div><div class="menu-btn" onclick="exportToFile()">📤 Export</div>
                <div class="menu-btn" onclick="triggerImport()">📥 Import</div><div class="menu-btn" onclick="closeAllModals()">✖ Zu</div>
            </div>
        </div>
        <div class="modal-content" id="listContent"></div>
    </div>

    <div id="historyModal" class="modal" style="border: 2px solid var(--accent-gray);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-shrink:0;">
            <span style="font-size:1.2rem; color:var(--accent-gray);">History</span>
            <button class="mode-toggle" style="background:var(--accent-red)" onclick="clearHistory()">Löschen</button>
        </div>
        <div class="modal-content" id="historyContent"></div>
        <button class="menu-btn" style="width:100%;" onclick="closeAllModals()">Schließen</button>
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">

    <script>
        const display = document.getElementById('display');
        const resArea = document.getElementById('result-area');
        const extraKeys = document.getElementById('extra-keys');
        const delBtn = document.getElementById('backspaceBtn');
        const mathFuncs = ['sin(', 'cos(', 'tan(', 'asin(', 'acos(', 'atan(', 'ceil(', 'floor(', 'round(', 'abs(', 'exp(', 'random()'];

        let lastContent = "";
        let useDegrees = true;
        let bsTimer;

        // --- Viewport Logik: Verhindert zu kleine Fenster bei Android-Tastatur ---
        if (window.visualViewport) {
            const initialHeight = window.innerHeight;
            window.visualViewport.addEventListener('resize', () => {
                const currentHeight = window.visualViewport.height;
                document.body.style.height = currentHeight + "px";
                
                // Wenn die Höhe deutlich schrumpft (Tastatur eingeblendet)
                if (currentHeight < initialHeight * 0.85) {
                    extraKeys.style.display = 'none'; // Verstecke Ziffernblock
                } else {
                    extraKeys.style.display = 'grid'; // Zeige Ziffernblock
                }
            });
        }

        function hideKeyboard() { if (document.activeElement) { document.activeElement.blur(); } }
        function logBase(val, base = 10) { return Math.log(val) / Math.log(base); }
        function toggleDegRad() { useDegrees = !useDegrees; document.getElementById('modeDisplay').innerText = useDegrees ? "Mode: DEG" : "Mode: RAD"; }
        
        function add(v) {
            const start = display.selectionStart, end = display.selectionEnd;
            display.setRangeText(v, start, end, 'end');
            display.focus();
        }

        function backspace() {
            const start = display.selectionStart;
            if (start > 0) {
                display.value = display.value.slice(0, start - 1) + display.value.slice(start);
                display.selectionStart = display.selectionEnd = start - 1;
            }
            display.focus();
        }

        function calculate() {
            hideKeyboard();
            try {
                let input = display.value;
                if(!input.trim()) return;
                let rawInput = input;
                input = input.replace(/\bx([0-9a-fA-F]+)\b/g, '0x$1');
                input = input.replace(/(\d)(?=[a-df-wyzA-DF-WYZ\(])/g, '$1*');
                let trigIn = useDegrees ? "(Math.PI/180*" : "(";
                let code = input.replace(/pi/g, 'Math.PI').replace(/e(?![a-zA-Z0-9\-\+])/g, 'Math.E')
                    .replace(/\basin\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.asin($1))" : "Math.asin($1)"))
                    .replace(/\bacos\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.acos($1))" : "Math.acos($1)"))
                    .replace(/\batan\((.*?)\)/g, (useDegrees ? "(180/Math.PI*Math.atan($1))" : "Math.atan($1)"))
                    .replace(/\bsin\(/g, 'Math.sin' + trigIn).replace(/\bcos\(/g, 'Math.cos' + trigIn).replace(/\btan\(/g, 'Math.tan' + trigIn)
                    .replace(/\b(abs|ceil|floor|round|exp|sqrt|random)\(/g, 'Math.$1(').replace(/\blog\(/g, 'logBase(').replace(/\bln\(/g, 'Math.log(').replace(/\^/g, '**');

                let res = eval(code.split('\n').map(l => {
                    let t = l.trim();
                    return (t.includes('=') && !t.includes('==')) ? "var " + t : t;
                }).join(';'));

                if(res !== undefined) {
                    resArea.innerHTML = "<b>Ergebnis:</b><br>" + res.toLocaleString('de-DE') + ((Number.isInteger(res)) ? " <br><small>Hex: 0x" + res.toString(16).toUpperCase() + "</small>" : "");
                    addToHistory(rawInput, res.toLocaleString('de-DE'));
                }
            } catch(e) { resArea.innerText = "Fehler: " + e.message; }
        }

        function showModal(id) { hideKeyboard(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; }
        function addToHistory(q, a) {
            let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
            history.unshift({ q, a, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            if (history.length > 50) history.pop();
            localStorage.setItem('calcHistory', JSON.stringify(history));
        }

        function openHistory() {
            const history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
            const list = document.getElementById('historyContent');
            list.innerHTML = history.length === 0 ? '<div class="list-item" style="color:#666">Leer</div>' : '';
            history.forEach((item, index) => {
                const div = document.createElement('div'); div.className = 'list-item';
                div.innerHTML = `<div style="color:#fff">${item.q}</div><div style="color:var(--accent-green)">= ${item.a}</div>`;
                div.onclick = () => { display.value = item.q; closeAllModals(); };
                list.appendChild(div);
            });
            showModal('historyModal');
        }

        function openMath() {
            const grid = document.getElementById('mathGrid'); grid.innerHTML = '';
            mathFuncs.forEach(f => {
                const b = document.createElement('div'); b.className = 'menu-btn'; b.innerText = f.replace('(', '');
                b.onclick = () => { add(f); closeAllModals(); }; grid.appendChild(b);
            });
            showModal('mathModal');
        }

        function openFunc() {
            const formulas = JSON.parse(localStorage.getItem('mySpecs') || '{}');
            const list = document.getElementById('listContent'); list.innerHTML = '';
            Object.keys(formulas).sort().forEach(name => {
                const item = document.createElement('div'); item.className = 'list-item'; item.innerText = name;
                item.onclick = () => { display.value = formulas[name]; closeAllModals(); };
                list.appendChild(item);
            });
            showModal('modal');
        }

        function saveCurrent() {
            const name = prompt("Name?"); if(!name) return;
            const formulas = JSON.parse(localStorage.getItem('mySpecs') || '{}');
            formulas[name] = display.value; localStorage.setItem('mySpecs', JSON.stringify(formulas));
            openFunc();
        }

        delBtn.onclick = () => backspace();
        document.querySelectorAll('button').forEach(btn => { if(btn.id !== 'backspaceBtn') { btn.addEventListener('mousedown', e => e.preventDefault()); } });
    </script>
</body>
</html>
