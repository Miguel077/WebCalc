<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebCalc Pro</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --btn-bg: #333;
            --accent-blue: #2c5d87; --accent-green: #27ae60; --accent-red: #c0392b;
            --accent-gray: #455a64; --hex-btn: #2a2a2a;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }
        #top-section { display: flex; flex-direction: column; flex: 1; min-height: 80px; width: 100%; gap: 5px; }
        #display {
            width: 100%; flex: 1; background: #000; color: #00ff00;
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.1rem; resize: none; outline: none;
        }
        #result-area {
            width: 100%; background: #1e1e1e; padding: 10px; border-radius: 8px;
            border-left: 5px solid var(--accent-blue); font-size: 1rem; word-wrap: break-word; flex-shrink: 0; min-height: 45px;
        }
        #controls { margin-top: 10px; flex-shrink: 0; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; width: 100%; max-width: 500px; margin: 0 auto; }
        button { padding: 12px 2px; font-size: 1rem; border: none; border-radius: 5px; background: var(--btn-bg); color: white; touch-action: manipulation; }
        .op { color: #3498db; font-weight: bold; }
        .func { background: #5d4037; font-weight: bold; }
        .del { background: var(--accent-red); }
        .equal { background: var(--accent-green); grid-column: span 2; font-weight: bold; }
        .hex { background: var(--hex-btn); color: #bb86fc; font-weight: bold; }
        .num { background: #444; font-weight: bold; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #252525; padding: 20px; border-radius: 12px; z-index: 1000; width: 85%; max-height: 80vh; 
        }
        .modal.active { display: flex; flex-direction: column; }
        .modal-content { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .menu-btn { padding: 12px 5px; background: #444; color: #fff; border-radius: 5px; text-align: center; width: 100%; margin-top: 5px;}
        .mode-toggle { padding: 5px 10px; background: var(--accent-blue); color: white; border-radius: 4px; font-size: 0.8rem; float: right; }
    </style>
</head>
<body>

    <div id="top-section">
        <textarea id="display" placeholder="Eingabe... (Wisch rauf für Tastatur)" inputmode="none" spellcheck="false"></textarea>
        <div id="result-area">Bereit...</div>
    </div>

    <div id="controls">
        <div class="grid">
            <button class="op" onclick="add('+')">+</button>
            <button class="op" onclick="add('-')">-</button>
            <button class="op" onclick="add('*')">*</button>
            <button class="op" onclick="add('/')">/</button>
            <button class="op" onclick="add('=')">=</button>
            <button class="del" id="backspaceBtn">⌫</button>

            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="add('^')">^</button>
            <button onclick="add('pi')">pi</button>
            <button class="op" style="background:#444" onclick="openMath()">Math</button>
            <button class="op" style="background:var(--accent-gray)" onclick="openHistory()">Hist</button>

            <button class="func" onclick="openFunc()">Func</button>
            <button onclick="add('ln(')">ln</button>
            <button onclick="add('log(')">log</button>
            <button onclick="add('sqrt(')">sqrt</button>
            <button class="equal" onclick="calculate()">BERECHNEN</button>
        </div>

        <div id="extra-keys" class="grid" style="margin-top:4px;">
            <button class="hex" onclick="add('A')">A</button>
            <button class="hex" onclick="add('B')">B</button>
            <button class="hex" onclick="add('C')">C</button>
            <button class="num" onclick="add('7')">7</button>
            <button class="num" onclick="add('8')">8</button>
            <button class="num" onclick="add('9')">9</button>
            
            <button class="hex" onclick="add('D')">D</button>
            <button class="hex" onclick="add('E')">E</button>
            <button class="hex" onclick="add('F')">F</button>
            <button class="num" onclick="add('4')">4</button>
            <button class="num" onclick="add('5')">5</button>
            <button class="num" onclick="add('6')">6</button>

            <button class="hex" onclick="add('0x')">0x</button>
            <button class="num" onclick="add('0')">0</button>
            <button class="num" onclick="add('.')">.</button>
            <button class="num" onclick="add('1')">1</button>
            <button class="num" onclick="add('2')">2</button>
            <button class="num" onclick="add('3')">3</button>
        </div>
    </div>

    <div id="overlay" onclick="closeAllModals()"></div>
    <div id="mathModal" class="modal">
        <div style="margin-bottom: 15px;"><span style="color: var(--accent-green); font-weight: bold;">Math</span><span id="modeDisplay" class="mode-toggle" onclick="toggleDegRad()">Mode: DEG</span></div>
        <div class="modal-content"><div class="grid" id="mathGrid" style="grid-template-columns: repeat(3, 1fr);"></div></div>
        <button class="menu-btn" style="background:var(--accent-red);" onclick="closeAllModals()">Schließen</button>
    </div>

    <script>
        const display = document.getElementById('display');
        const resArea = document.getElementById('result-area');
        const delBtn = document.getElementById('backspaceBtn');
        const mathFuncs = ['sin(', 'cos(', 'tan(', 'asin(', 'acos(', 'atan(', 'ceil(', 'floor(', 'round(', 'abs(', 'exp(', 'random()'];
        let useDegrees = true;

        // --- GESTENSTEUERUNG ---
        let touchStartY = 0;
        display.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY, {passive: true});
        display.addEventListener('touchend', e => {
            const diff = touchStartY - e.changedTouches[0].clientY;
            if (diff > 60) { display.inputMode = "text"; display.focus(); }
            else if (diff < -60) { display.inputMode = "none"; display.blur(); }
        });

        function add(v) {
            const start = display.selectionStart, end = display.selectionEnd;
            display.setRangeText(v, start, end, 'end');
            display.focus(); // Wichtig für Cursor-Position
        }

        function backspace() {
            const start = display.selectionStart, end = display.selectionEnd;
            if (start === end && start > 0) {
                display.value = display.value.slice(0, start - 1) + display.value.slice(start);
                display.selectionStart = display.selectionEnd = start - 1;
            } else { display.setRangeText('', start, end, 'end'); }
            display.focus();
        }
        delBtn.onclick = (e) => { e.preventDefault(); backspace(); };

        function calculate() {
            display.inputMode = "none"; display.blur();
            try {
                let input = display.value;
                if(!input.trim()) return;
                
                let calc = input.replace(/\bx([0-9a-fA-F]+)\b/g, '0x$1')
                                .replace(/(\d)(?=[a-df-wyzA-DF-WYZ\(])/g, '$1*');
                
                let trigIn = useDegrees ? "(Math.PI/180*" : "(";
                let code = calc.replace(/pi/g, 'Math.PI')
                    .replace(/\bsin\(/g, 'Math.sin' + trigIn).replace(/\bcos\(/g, 'Math.cos' + trigIn).replace(/\btan\(/g, 'Math.tan' + trigIn)
                    .replace(/\b(abs|ceil|floor|round|exp|sqrt|random)\(/g, 'Math.$1(')
                    .replace(/\blog\(/g, '(Math.log10(').replace(/\bln\(/g, '(Math.log(')
                    .replace(/\^/g, '**');

                let res = eval(code.split('\n').map(l => l.trim().includes('=') ? "var " + l : l).join(';'));
                if(res !== undefined) {
                    resArea.innerHTML = "<b>Ergebnis:</b><br>" + res.toLocaleString('de-DE') + 
                    (Number.isInteger(res) ? " <br><small>Hex: 0x" + res.toString(16).toUpperCase() + "</small>" : "");
                }
            } catch(e) { resArea.innerText = "Fehler: " + e.message; }
        }

        function openMath() {
            const g = document.getElementById('mathGrid'); g.innerHTML = '';
            mathFuncs.forEach(f => {
                const b = document.createElement('button'); b.innerText = f.replace('(', '');
                b.onclick = () => { add(f); closeAllModals(); }; g.appendChild(b);
            });
            document.getElementById('mathModal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; }
        function toggleDegRad() { useDegrees = !useDegrees; document.getElementById('modeDisplay').innerText = useDegrees ? "Mode: DEG" : "Mode: RAD"; }
    </script>
</body>
</html>
